{% extends "base.html" %}
{% block title %}Log in — webgame-rpg{% endblock %}
{% block content %}
  <div class="panel">
    <h1>Log in</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">Log in</button>
    </form>
    <p>No account yet? <a href="{% url 'signup' %}">Create one</a>.</p>
  </div>
{% endblock %}
